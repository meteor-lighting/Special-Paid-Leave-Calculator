<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>maki-rm-special-paid-leave</title>
    <style rel="stylesheet" crossorigin>@import "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap";
:root{--bg-color:#050505;--surface-color:#ffffff08;--surface-border:#ffffff14;--accent-color:#10b981;--accent-glow:#10b9814d;--text-primary:#f8fafc;--text-secondary:#94a3b8;--danger-color:#ef4444;--glass-blur:blur(12px);--transition-smooth:all .3s cubic-bezier(.4, 0, .2, 1)}
*{box-sizing:border-box;margin:0;padding:0}
body{background-color:var(--bg-color);color:var(--text-primary);-webkit-font-smoothing:antialiased;min-height:100vh;font-family:Inter,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.5;overflow-x:hidden}
body:before{content:"";background:radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);z-index:-1;filter:blur(80px);width:40%;height:40%;position:fixed;top:-10%;left:-10%}
.app-container{max-width:1200px;margin:0 auto;padding:2rem}
.glass-card{background:var(--surface-color);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--surface-border);border-radius:1.5rem;box-shadow:0 8px 32px #0006}
button{cursor:pointer;transition:var(--transition-smooth);border:none;border-radius:.75rem;align-items:center;gap:.5rem;padding:.75rem 1.5rem;font-family:inherit;font-weight:600;display:inline-flex}
button.primary{background:var(--accent-color);color:#000}
button.primary:hover{box-shadow:0 0 20px var(--accent-glow);transform:translateY(-2px)}
button.secondary{background:var(--surface-color);border:1px solid var(--surface-border);color:var(--text-primary)}
button.secondary:hover{background:#ffffff14}
input,select,textarea{border:1px solid var(--surface-border);color:var(--text-primary);width:100%;transition:var(--transition-smooth);background:#ffffff0d;border-radius:.75rem;padding:.75rem 1rem;font-family:inherit;font-size:1rem}
input:focus,select:focus,textarea:focus{border-color:var(--accent-color);background:#ffffff14;outline:none}
table{border-collapse:collapse;width:100%;margin-top:1.5rem}
th{text-align:left;color:var(--text-secondary);border-bottom:1px solid var(--surface-border);text-transform:uppercase;letter-spacing:.05em;padding:1rem;font-size:.875rem;font-weight:500}
td{border-bottom:1px solid var(--surface-border);padding:1rem}
tr:last-child td{border-bottom:none}
.badge{border-radius:1rem;padding:.25rem .75rem;font-size:.75rem;font-weight:600}
.badge-accent{color:var(--accent-color);background:#10b9811a;border:1px solid #10b98133}
@keyframes spin{0%{transform:rotate(0)}to{transform:rotate(360deg)}}
.animate-spin{animation:1s linear infinite spin}
.animate-fade-in{animation:.5s forwards fadeIn}
